name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'

      - name: Set up pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository checks
        run: pnpm check

      - name: Test packed package consumer
        run: pnpm test:package

      - name: Run benchmark smoke and verify committed evidence
        run: pnpm benchmark:smoke && pnpm benchmark:verify

      - name: Test HTTP boundary and smoke service
        run: pnpm test:api && pnpm serve:smoke
