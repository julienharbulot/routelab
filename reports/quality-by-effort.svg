<svg xmlns="http://www.w3.org/2000/svg" width="760" height="390" viewBox="0 0 760 390" role="img" aria-labelledby="quality-title quality-desc"><title id="quality-title">Deterministic quality by effort</title><desc id="quality-desc">Greedy and numerical split p95 regret across the categorical fast, balanced, and thorough effort profiles. Lower regret is better.</desc><rect width="760" height="390" fill="white"/><line x1="75" y1="320" x2="690" y2="320" stroke="#333"/><line x1="75" y1="75" x2="75" y2="320" stroke="#333"/><text x="145" y="350" font-size="12">fast</text><text x="375" y="350" font-size="12">balanced</text><text x="605" y="350" font-size="12">thorough</text><text x="305" y="380" font-size="14">Effort profile (categorical)</text><text x="18" y="270" font-size="14" transform="rotate(-90 18 270)">p95 regret (ppm; lower is better)</text><g data-series="greedy-split" fill="none" stroke="#2356a8"><polyline stroke-width="3" points="170.0,85.0 400.0,152.5 630.0,275.0"/><circle data-profile="fast" data-regret-ppm="5736" cx="170.0" cy="85.0" r="5" fill="#2356a8"/><circle data-profile="balanced" data-regret-ppm="4016" cx="400.0" cy="152.5" r="5" fill="#2356a8"/><circle data-profile="thorough" data-regret-ppm="891" cx="630.0" cy="275.0" r="5" fill="#2356a8"/><text x="100" y="50" fill="#2356a8" stroke="none" font-size="14">greedy-split</text></g><g data-series="numerical-split" fill="none" stroke="#c14924"><polyline stroke-width="3" points="170.0,152.5 400.0,243.3 630.0,284.9"/><circle data-profile="fast" data-regret-ppm="4016" cx="170.0" cy="152.5" r="5" fill="#c14924"/><circle data-profile="balanced" data-regret-ppm="1700" cx="400.0" cy="243.3" r="5" fill="#c14924"/><circle data-profile="thorough" data-regret-ppm="640" cx="630.0" cy="284.9" r="5" fill="#c14924"/><text x="330" y="50" fill="#c14924" stroke="none" font-size="14">numerical-split</text></g></svg>
