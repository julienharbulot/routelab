<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380" role="img" aria-labelledby="title desc"><title id="title">Quality versus in-process latency</title><desc id="desc">Fast-profile median latency and median regret for three routing strategies.</desc><rect width="760" height="380" fill="white"/><line x1="80" y1="310" x2="710" y2="310" stroke="#333"/><line x1="80" y1="70" x2="80" y2="310" stroke="#333"/><text x="300" y="355" font-size="14">median elapsed microseconds (fast profile)</text><text x="18" y="230" font-size="14" transform="rotate(-90 18 230)">median regret (bps; lower is better)</text><circle cx="90.0" cy="190.0" r="6" fill="#2864dc"/><text x="100.0" y="194.0" font-size="13">best-single</text><circle cx="512.5" cy="190.0" r="6" fill="#159447"/><text x="522.5" y="194.0" font-size="13">greedy-split</text><circle cx="690.0" cy="190.0" r="6" fill="#d06421"/><text x="700.0" y="194.0" font-size="13">numerical-split</text><text x="90" y="35" font-size="18" font-weight="600">RouteLab portfolio-v1</text></svg>
