<svg xmlns="http://www.w3.org/2000/svg" width="760" height="390" viewBox="0 0 760 390" role="img" aria-labelledby="quality-title quality-desc"><title id="quality-title">Deterministic quality versus work</title><desc id="quality-desc">Greedy and numerical split p95 regret across fast, balanced, and thorough effort. Lower regret is better.</desc><rect width="760" height="390" fill="white"/><line x1="75" y1="320" x2="690" y2="320" stroke="#333"/><line x1="75" y1="75" x2="75" y2="320" stroke="#333"/><text x="290" y="370" font-size="14">Deterministic work (p50 counters)</text><text x="18" y="270" font-size="14" transform="rotate(-90 18 270)">p95 regret (ppm; lower is better)</text><g data-series="greedy-split" fill="none" stroke="#2356a8"><polyline stroke-width="3" points="133.6,85.0 168.6,152.5 378.6,275.0"/><circle data-profile="fast" data-work="622" data-regret-ppm="5736" cx="133.6" cy="85.0" r="5" fill="#2356a8"/><text x="140.6" y="78.0" fill="#222" stroke="none" font-size="11">fast</text><circle data-profile="balanced" data-work="1070" data-regret-ppm="4016" cx="168.6" cy="152.5" r="5" fill="#2356a8"/><text x="175.6" y="145.5" fill="#222" stroke="none" font-size="11">balanced</text><circle data-profile="thorough" data-work="3758" data-regret-ppm="891" cx="378.6" cy="275.0" r="5" fill="#2356a8"/><text x="385.6" y="268.0" fill="#222" stroke="none" font-size="11">thorough</text><text x="100" y="50" fill="#2356a8" stroke="none" font-size="14">greedy-split</text></g><g data-series="numerical-split" fill="none" stroke="#c14924"><polyline stroke-width="3" points="173.0,152.5 313.7,243.3 665.0,284.9"/><circle data-profile="fast" data-work="1126" data-regret-ppm="4016" cx="173.0" cy="152.5" r="5" fill="#c14924"/><text x="180.0" y="145.5" fill="#222" stroke="none" font-size="11">fast</text><circle data-profile="balanced" data-work="2927" data-regret-ppm="1700" cx="313.7" cy="243.3" r="5" fill="#c14924"/><text x="320.7" y="236.3" fill="#222" stroke="none" font-size="11">balanced</text><circle data-profile="thorough" data-work="7424" data-regret-ppm="640" cx="665.0" cy="284.9" r="5" fill="#c14924"/><text x="672.0" y="277.9" fill="#222" stroke="none" font-size="11">thorough</text><text x="330" y="50" fill="#c14924" stroke="none" font-size="14">numerical-split</text></g></svg>
