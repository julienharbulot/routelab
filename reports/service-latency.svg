<svg xmlns="http://www.w3.org/2000/svg" width="760" height="390" viewBox="0 0 760 390" role="img" aria-labelledby="service-title service-desc"><title id="service-title">Isolated service latency by execution mode</title><desc id="service-desc">Successful end-to-end latency by client concurrency and execution mode; lower is better.</desc><rect width="760" height="390" fill="white"/><line x1="75" y1="325" x2="680" y2="325" stroke="#333"/><line x1="75" y1="75" x2="75" y2="325" stroke="#333"/><text x="315" y="370" font-size="14">Client concurrency</text><text x="18" y="270" font-size="14" transform="rotate(-90 18 270)">End-to-end latency (µs; lower is better)</text><g data-series="same-thread-p50" stroke="#2155a5" fill="none"><polyline stroke-width="3" points="120.6,299.5 227.5,276.2 655.0,156.5"/><circle data-mode="same-thread" data-concurrency="1" data-latency-micros="3531" cx="120.6" cy="299.5" r="5" fill="#2155a5"/><circle data-mode="same-thread" data-concurrency="4" data-latency-micros="8865" cx="227.5" cy="276.2" r="5" fill="#2155a5"/><circle data-mode="same-thread" data-concurrency="16" data-latency-micros="36188" cx="655.0" cy="156.5" r="5" fill="#2155a5"/><text x="90" y="42" fill="#2155a5" stroke="none" font-size="11">same-thread p50</text></g><g data-series="same-thread-p95" stroke="#b55b1d" fill="none"><polyline stroke-width="3" points="120.6,288.4 227.5,243.1 655.0,100.7"/><circle data-mode="same-thread" data-concurrency="1" data-latency-micros="6071" cx="120.6" cy="288.4" r="5" fill="#b55b1d"/><circle data-mode="same-thread" data-concurrency="4" data-latency-micros="16426" cx="227.5" cy="243.1" r="5" fill="#b55b1d"/><circle data-mode="same-thread" data-concurrency="16" data-latency-micros="48936" cx="655.0" cy="100.7" r="5" fill="#b55b1d"/><text x="265" y="42" fill="#b55b1d" stroke="none" font-size="11">same-thread p95</text></g><g data-series="same-thread-p99" stroke="#9b2f4a" fill="none"><polyline stroke-width="3" points="120.6,285.2 227.5,233.5 655.0,90.0"/><circle data-mode="same-thread" data-concurrency="1" data-latency-micros="6799" cx="120.6" cy="285.2" r="5" fill="#9b2f4a"/><circle data-mode="same-thread" data-concurrency="4" data-latency-micros="18604" cx="227.5" cy="233.5" r="5" fill="#9b2f4a"/><circle data-mode="same-thread" data-concurrency="16" data-latency-micros="51375" cx="655.0" cy="90.0" r="5" fill="#9b2f4a"/><text x="440" y="42" fill="#9b2f4a" stroke="none" font-size="11">same-thread p99</text></g></svg>
