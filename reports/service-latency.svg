<svg xmlns="http://www.w3.org/2000/svg" width="760" height="390" viewBox="0 0 760 390" role="img" aria-labelledby="service-title service-desc"><title id="service-title">Isolated service latency by execution mode</title><desc id="service-desc">Successful end-to-end latency by client concurrency and execution mode; lower is better.</desc><rect width="760" height="390" fill="white"/><line x1="75" y1="325" x2="680" y2="325" stroke="#333"/><line x1="75" y1="75" x2="75" y2="325" stroke="#333"/><text x="315" y="370" font-size="14">Client concurrency</text><text x="18" y="270" font-size="14" transform="rotate(-90 18 270)">End-to-end latency (µs; lower is better)</text><g data-series="same-thread-p50" stroke="#2155a5" fill="none"><polyline stroke-width="3" points="120.6,301.2 227.5,281.3 655.0,164.4"/><circle data-mode="same-thread" data-concurrency="1" data-latency-micros="3487" cx="120.6" cy="301.2" r="5" fill="#2155a5"/><circle data-mode="same-thread" data-concurrency="4" data-latency-micros="8496" cx="227.5" cy="281.3" r="5" fill="#2155a5"/><circle data-mode="same-thread" data-concurrency="16" data-latency-micros="37972" cx="655.0" cy="164.4" r="5" fill="#2155a5"/><text x="90" y="42" fill="#2155a5" stroke="none" font-size="11">same-thread p50</text></g><g data-series="same-thread-p95" stroke="#b55b1d" fill="none"><polyline stroke-width="3" points="120.6,290.7 227.5,253.4 655.0,107.0"/><circle data-mode="same-thread" data-concurrency="1" data-latency-micros="6126" cx="120.6" cy="290.7" r="5" fill="#b55b1d"/><circle data-mode="same-thread" data-concurrency="4" data-latency-micros="15521" cx="227.5" cy="253.4" r="5" fill="#b55b1d"/><circle data-mode="same-thread" data-concurrency="16" data-latency-micros="52444" cx="655.0" cy="107.0" r="5" fill="#b55b1d"/><text x="265" y="42" fill="#b55b1d" stroke="none" font-size="11">same-thread p95</text></g><g data-series="same-thread-p99" stroke="#9b2f4a" fill="none"><polyline stroke-width="3" points="120.6,286.0 227.5,248.6 655.0,90.0"/><circle data-mode="same-thread" data-concurrency="1" data-latency-micros="7318" cx="120.6" cy="286.0" r="5" fill="#9b2f4a"/><circle data-mode="same-thread" data-concurrency="4" data-latency-micros="16745" cx="227.5" cy="248.6" r="5" fill="#9b2f4a"/><circle data-mode="same-thread" data-concurrency="16" data-latency-micros="56735" cx="655.0" cy="90.0" r="5" fill="#9b2f4a"/><text x="440" y="42" fill="#9b2f4a" stroke="none" font-size="11">same-thread p99</text></g><g data-series="worker-p50" stroke="#287a4a" fill="none"><polyline stroke-width="3" points="120.6,300.4 227.5,295.3 655.0,249.7"/><circle data-mode="worker" data-concurrency="1" data-latency-micros="3669" cx="120.6" cy="300.4" r="5" fill="#287a4a"/><circle data-mode="worker" data-concurrency="4" data-latency-micros="4967" cx="227.5" cy="295.3" r="5" fill="#287a4a"/><circle data-mode="worker" data-concurrency="16" data-latency-micros="16463" cx="655.0" cy="249.7" r="5" fill="#287a4a"/><text x="90" y="59" fill="#287a4a" stroke="none" font-size="11">worker p50</text></g><g data-series="worker-p95" stroke="#7b49a5" fill="none"><polyline stroke-width="3" points="120.6,286.6 227.5,276.4 655.0,208.4"/><circle data-mode="worker" data-concurrency="1" data-latency-micros="7171" cx="120.6" cy="286.6" r="5" fill="#7b49a5"/><circle data-mode="worker" data-concurrency="4" data-latency-micros="9734" cx="227.5" cy="276.4" r="5" fill="#7b49a5"/><circle data-mode="worker" data-concurrency="16" data-latency-micros="26890" cx="655.0" cy="208.4" r="5" fill="#7b49a5"/><text x="265" y="59" fill="#7b49a5" stroke="none" font-size="11">worker p95</text></g><g data-series="worker-p99" stroke="#996515" fill="none"><polyline stroke-width="3" points="120.6,274.8 227.5,260.4 655.0,171.2"/><circle data-mode="worker" data-concurrency="1" data-latency-micros="10128" cx="120.6" cy="274.8" r="5" fill="#996515"/><circle data-mode="worker" data-concurrency="4" data-latency-micros="13766" cx="227.5" cy="260.4" r="5" fill="#996515"/><circle data-